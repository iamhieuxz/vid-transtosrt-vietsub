whisper:
  model_size: large-v3-turbo
  device: cuda
  compute_type: float16
  language: zh
  beam_size: 5
  vad_filter: true
  min_silence_duration_ms: 500
project:
  name: test5
  source_lang: Chinese
  target_lang: Vietnamese
  input_srt: E:/trans-video/test4.mp4
  output_srt: E:/trans-video/test5.srt
window:
  size: 10
  history: 12
  future: 4
translation:
  mode: uncen
models:
  default:
    name: qwen3.5:9b
    ollama_url: http://localhost:11434/api/generate
    temperature: 0.05
    repeat_penalty: 1.3
    num_ctx: 6144
    num_predict: 1024
    timeout: 180
  uncen:
    name: huihui_ai/qwen3-abliterated:8b-v2
    ollama_url: http://localhost:11434/api/generate
    temperature: 0.05
    repeat_penalty: 1.3
    num_ctx: 6144
    num_predict: 1024
    timeout: 180
pipeline:
  enable_glossary: true
  max_retries: 3
  retry_delay: 2
  num_workers: 1
  checkpoint_interval: 20
  heartbeat_timeout: 600
  circuit_breaker_threshold: 5
  circuit_breaker_cooldown: 60
