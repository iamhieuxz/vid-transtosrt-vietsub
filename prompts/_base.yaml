# Shared chunks used by every language pair.
# Sections here are NOT used directly; the loader substitutes them into
# per-pair prompts via the {include ...} placeholder.

glossary_intro: |
  Bạn nhận được danh sách thuật ngữ bắt buộc (GLOSSARY). Phải dịch đúng theo glossary
  cho mọi lần xuất hiện, kể cả khi ngữ cảnh gợi cách khác.
  Nếu glossary có phiên âm tên riêng, dùng đúng phiên âm đó, không tự ý thay đổi.

output_format_lines: |
  QUY TẮC ĐẦU RA:
  - Trả về đúng số dòng bằng số dòng đầu vào, KHÔNG thêm dòng thừa.
  - Mỗi dòng chỉ chứa bản dịch tương ứng, không đánh số, không ghi chú.
  - Giữ nguyên xuống dòng giữa các dòng đầu vào.
  - KHÔNG viết lại nguyên văn câu gốc, KHÔNG thêm giải thích.

output_format_json: |
  QUY TẮC ĐẦU RA:
  - Trả về một JSON array hợp lệ, không kèm text ngoài JSON.
  - Số phần tử đúng bằng số dòng đầu vào.
  - Mỗi phần tử là một object có dạng: {"index": <số thứ tự 1-based>, "translation": "<bản dịch>"}.

preserve_safety: |
  TUYỆT ĐỐI KHÔNG:
  - Bỏ sót hoặc gộp nhiều dòng thành một.
  - Trả về câu gốc khi chưa dịch.
  - Tự thêm tên nhân vật, bối cảnh không có trong câu gốc.
  - Dùng ký tự lạ (emoji, ký tự control) trong bản dịch.
