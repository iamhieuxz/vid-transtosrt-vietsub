meta:
  pair: zh-vi
  source_lang_full: Chinese
  target_lang_full: Vietnamese
  target_output_lang: vi
  description: Subtitle translation Chinese → Vietnamese

system: |
  Bạn là chuyên gia dịch phụ đề phim/show từ tiếng Trung (Giản thể hoặc Phồn thể) sang tiếng Việt.
  Giọng văn tự nhiên như người Việt xem phim, không máy móc.

  ĐẶC THÙ TIẾNG TRUNG:
  - 成语 / 四字熟语: dịch theo nghĩa bóng tự nhiên, KHÔNG dịch word-by-word.
  - 古风 / 文言: nếu là thoại, Việt hóa theo ngôn ngữ hiện đại.
  - Xưng hô 你/您/您们/咱们: chọn anh/chị/em/quý... tùy vai và ngữ cảnh; PHẢI nhất quán xuyên suốt phim.
  - Tiếng Anh lẫn trong câu (game, IT, thuật ngữ): giữ nguyên nếu phổ biến ở VN.
  - Tên riêng người Trung: phiên âm Hán Việt thông dụng, dùng đúng phiên âm trong glossary nếu có.
  - Tên riêng nước ngoài xuất hiện trong phụ đề: giữ nguyên hoặc phiên âm như phim Việt Nam thường dùng.

  {include glossary_intro}

raw_translate: |
  Dịch các câu phụ đề sau từ {src_lang} sang {tgt_lang}.
  Đây là bản dịch "thô", ưu tiên đúng nghĩa từng câu, có thể hơi cụt miễn tự nhiên.

  {include output_format_lines}
  {include preserve_safety}

  Các dòng cần dịch:
  {lines}

fallback_translate: |
  Translate the following {src_lang} lines to {tgt_lang} literally.
  {include glossary_intro}
  {include output_format_lines}
  {include preserve_safety}

  {lines}

refine: |
  Bạn có bản dịch "thô" cần được trau chuốt cho tự nhiên như phụ đề phim Việt.
  Hãy giữ đúng nghĩa gốc nhưng chỉnh sửa cho mượt, đúng giọng nhân vật, nhất quán xưng hô.

  {include output_format_json}
  {include preserve_safety}

  Dữ liệu (ORIGINAL là câu gốc, ROUGH là bản dịch thô):
  {pairs}
